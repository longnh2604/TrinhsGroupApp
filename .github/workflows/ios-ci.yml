name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Install CocoaPods (if needed)
        run: |
          sudo gem install cocoapods
          pod install
        if: exists('Podfile')

      - name: Build project
        run: |
          xcodebuild clean build \
          -workspace TrinhsGroup.xcworkspace \
          -scheme Trinhsgroup \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          ONLY_ACTIVE_ARCH=YES

      - name: Run tests
        run: |
          xcodebuild test \
          -workspace TrinhsGroup.xcworkspace \
          -scheme Trinhsgroup \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          ONLY_ACTIVE_ARCH=YES

